name: API Tests and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Install Newman
        run: npm install -g newman

      - name: Run tests with Env 1
        run: |          
         newman run postman/APITesting.postman_collection.json \
          -e postman/JSONPlaceholderENV.postman_environment.json \
          # The ENV file for environment variables
          --folder "JSONPlaceholderCRUDBasics" \
          # The --folder flag to not test all collection only specific folder
          --reporters cli
          # This is a flag for Newman that indicates text output directly to the GitHub Actions console (with colors and statuses).

      - name: Run tests with Env 2
        run: |          
         newman run postman/APITesting.postman_collection.json \
          -e postman/ReqResENV.postman_environment.json \
          --folder "ReqResCRUDandAuthentication" \
          --reporters cli
        if: success()
        # Adds condition to perform the step only if the previous steps were successful.

      - name: Run tests with Env 3
        run: |          
         newman run postman/APITesting.postman_collection.json \
          -e postman/restful-bookerENV.postman_environment.json \
          --folder "Restful-BookerCRUDandOptions" \
          --reporters cli
        if: success()

  deploy:
    runs-on: ubuntu-latest
    needs: test
    # Makes the deploy job dependent on the test job. If tests fail, deployment is skipped.
    permissions:
      contents: write
      # Grant it permission to push to the gh-pages branch.
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
